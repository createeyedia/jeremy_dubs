<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ogGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8ff00"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="ogBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8ff00"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <radialGradient id="ag" cx="20%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#c8ff00" stop-opacity=".07"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ac" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#ag)"/>
  <rect width="1200" height="630" fill="url(#ac)"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#ogBar)"/>

  <!-- Cat mascot — centered at (600, 190) using nested svg -->
  <svg x="490" y="60" width="220" height="220" viewBox="0 0 80 80">
    <path d="M15 25L20 7.5c0-1.2 1.5-1.8 2.2-.8L30 16h20l7.8-9.3c.7-1 2.2-.4 2.2.8L65 25c5 6 5 14 0 20-3.7 5-10 8.7-17.5 10v3.7c0 2-1.7 3.7-3.7 3.7h-7.6c-2 0-3.7-1.7-3.7-3.7V55C25.7 53.7 19 50 15.5 45c-5-6-5-14 0-20z" fill="url(#ogGrad)" opacity="0.9"/>
    <circle cx="30" cy="34" r="6" fill="#08090c"/>
    <circle cx="50" cy="34" r="6" fill="#08090c"/>
    <circle cx="32" cy="32" r="2.2" fill="#eef2ff"/>
    <circle cx="52" cy="32" r="2.2" fill="#eef2ff"/>
    <ellipse cx="40" cy="44" rx="3" ry="2" fill="#ff6b9d"/>
    <path d="M35 47q5 3.5 10 0" stroke="#08090c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </svg>

  <!-- Wordmark -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" fill="#ffffff" letter-spacing="-1">Cascade Creatives</text>

  <!-- Tagline -->
  <text x="600" y="425" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#888888" letter-spacing="4">
    <tspan>WEB DESIGN</tspan>
    <tspan dx="18" fill="#c8ff00">·</tspan>
    <tspan dx="18">CONTENT</tspan>
    <tspan dx="18" fill="#00d4ff">·</tspan>
    <tspan dx="18">STRATEGY</tspan>
  </text>

  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#666666" letter-spacing="2">cascadecreatives.com</text>

  <!-- Bottom gradient bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#ogBar)"/>
</svg>
